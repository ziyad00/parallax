name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build sdist + wheel and upload to PyPI
    runs-on: ubuntu-latest
    # Use OIDC trusted publishing — no API token needs to live in repo secrets.
    # Configure at https://pypi.org/manage/account/publishing/ for the
    # parallax-scan project pointing at this repo + workflow.
    environment:
      name: pypi
      url: https://pypi.org/p/parallax-scan
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: pip install --upgrade build
      - name: Build sdist and wheel
        run: python -m build
      - name: Verify built artifacts
        run: |
          ls -lah dist/
          pip install --force-reinstall dist/*.whl
          parallax list-extractors
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
